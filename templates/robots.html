<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robots.txt</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-y">
    <main class="page-y-wrap">
        <section class="page-y-card glass">
            <span class="pill page-y-pill">SUPER SECRET FILE</span>
            <p class="page-y-subtext">
                You were curious enough to open <code>robots.txt</code>. That is either genius or terminally suspicious behavior.
            </p>

            <div class="page-y-terminal">
<pre>User-agent: *
Disallow: /johnpork

# enormous brain activity detected
# /static/images/img_y.jpg</pre>
            </div>

            <div class="page-y-frame">
                <img src="/static/images/img_y.jpg" alt="decorative image">
            </div>

            <div class="notice page-y-notice">
                There is absolutely nothing wrong with this image!
            </div>

            <div class="actions page-y-actions">
                <a href="/" class="btn btn-primary">Return home</a>
                <a href="/blog" class="btn btn-secondary">Back to blog</a>
            </div>
        </section>
    </main>
</body>
</html>
